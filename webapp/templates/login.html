{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-md-5 col-lg-4">
        <div class="card">
            <div class="card-body">
                <h4 class="mb-1">Вход в систему</h4>
                <p class="small-muted mb-3">Доступ к веб-интерфейсу ИТ-мастерской</p>
                <form method="post" class="vstack gap-2">
                    <input type="hidden" name="next" value="{{ next_url }}">
                    <div>
                        <label class="form-label">Логин</label>
                        <input class="form-control" name="username" value="ITM" autocomplete="username" required autofocus>
                    </div>
                    <div>
                        <label class="form-label">Пароль</label>
                        <input class="form-control" type="password" name="password" autocomplete="current-password" required>
                    </div>
                    <button class="btn btn-primary mt-2" type="submit">Войти</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "ИТ-мастерская" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-card-soft: #0b1220;
            --border: #334155;
            --text-main: #e2e8f0;
            --text-soft: #94a3b8;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #059669;
            --warning: #d97706;
        }
        body { background: var(--bg-main); color: var(--text-main); }
        .navbar { background: #111827; border-color: var(--border); }
        .card { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-main); }
        .table { color: var(--text-main); margin-bottom: 0; }
        .table > :not(caption) > * > * {
            background-color: transparent !important;
            border-bottom-color: var(--border) !important;
            color: var(--text-main) !important;
        }
        .table thead th {
            color: #bfdbfe !important;
            border-bottom-color: #475569 !important;
            background: #172033 !important;
        }
        .table tfoot th { background: #172033 !important; }
        .table-responsive { background: var(--bg-card-soft); border: 1px solid var(--border); border-radius: .5rem; padding: .35rem; }
        .text-secondary, .small-muted { color: var(--text-soft) !important; }
        .form-control, .form-select, textarea.form-control {
            background: #0b1220;
            color: var(--text-main);
            border: 1px solid var(--border);
        }
        .form-control::placeholder { color: #6b7280; }
        .form-control:focus, .form-select:focus {
            background: #0b1220;
            color: #fff;
            border-color: #60a5fa;
            box-shadow: none;
        }
        .btn-primary { background: var(--primary); border-color: var(--primary); }
        .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
        .btn-success { background: var(--success); border-color: var(--success); }
        .btn-warning { background: var(--warning); border-color: var(--warning); color: #fff; }
        .btn-outline-light { border-color: #64748b; color: #cbd5e1; }
        .btn-outline-light:hover { background: #334155; color: #fff; border-color: #64748b; }
        .alert { border: 1px solid transparent; }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg border-bottom mb-4">
    <div class="container-fluid">
        <a class="navbar-brand text-light fw-bold" href="{{ url_for('dashboard') }}">ИТ-мастерская</a>
        <div class="navbar-nav flex-row gap-2">
            <a class="btn btn-outline-light btn-sm" href="{{ url_for('dashboard') }}">Главная</a>
            <a class="btn btn-outline-light btn-sm" href="{{ url_for('orders') }}">Заказы</a>
            <a class="btn btn-outline-light btn-sm" href="{{ url_for('clients') }}">Клиенты</a>
            <a class="btn btn-outline-light btn-sm" href="{{ url_for('services') }}">Услуги</a>
            <a class="btn btn-success btn-sm" href="{{ url_for('create_order') }}">Новый заказ</a>
        </div>
    </div>
</nav>

<main class="container-fluid pb-4">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            <div class="mb-3">
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else category }} py-2 mb-2" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
</main>
</body>
</html>

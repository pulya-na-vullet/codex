<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title|default:"ИТ-мастерская" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --bg-card-soft: #0b1220;
            --border: #334155;
            --text-main: #e2e8f0;
            --text-soft: #94a3b8;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #059669;
            --warning: #d97706;
        }
        body { background: var(--bg-main); color: var(--text-main); }
        .navbar { background: #111827; border-color: var(--border); }
        .card { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-main); }
        .table { color: var(--text-main); margin-bottom: 0; }
        .table > :not(caption) > * > * {
            background-color: transparent !important;
            border-bottom-color: var(--border) !important;
            color: var(--text-main) !important;
        }
        .table thead th {
            color: #bfdbfe !important;
            border-bottom-color: #475569 !important;
            background: #172033 !important;
        }
        .table tfoot th { background: #172033 !important; }
        .table tr.order-row-unpaid > * { background-color: rgba(220, 38, 38, 0.22) !important; }
        .table tr.order-row-paid-no-mytax > * { background-color: rgba(217, 119, 6, 0.22) !important; }
        .table tr.order-row-complete > * { background-color: rgba(5, 150, 105, 0.18) !important; }
        .table tr.service-inactive > * { opacity: 0.65; }
        .table-responsive { background: var(--bg-card-soft); border: 1px solid var(--border); border-radius: .5rem; padding: .35rem; }
        .text-secondary, .small-muted { color: var(--text-soft) !important; }
        .form-control, .form-select, textarea.form-control {
            background: #0b1220; color: var(--text-main); border: 1px solid var(--border);
        }
        .form-control::placeholder { color: #6b7280; }
        .form-control:focus, .form-select:focus {
            background: #0b1220; color: #fff; border-color: #60a5fa; box-shadow: none;
        }
        .btn-primary { background: var(--primary); border-color: var(--primary); }
        .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
        .btn-success { background: var(--success); border-color: var(--success); }
        .btn-warning { background: var(--warning); border-color: var(--warning); color: #fff; }
        .btn-outline-light { border-color: #64748b; color: #cbd5e1; }
        .btn-outline-light:hover { background: #334155; color: #fff; border-color: #64748b; }
        .alert { border: 1px solid transparent; }
        .form-check-input { background-color: #0b1220; border-color: #64748b; }
        .form-check-input:checked { background-color: #2563eb; border-color: #2563eb; }
        .form-check-label, .form-label { color: var(--text-main); }
        a { color: #93c5fd; }
        .service-tree {
            max-height: 520px; overflow: auto; border: 1px solid var(--border);
            border-radius: .5rem; padding: .5rem .65rem; background: #0b1220;
        }
        .tree-list, .tree-services { list-style: none; margin: 0; padding-left: .85rem; }
        .tree-category { cursor: pointer; color: #bfdbfe; font-weight: 600; }
        .service-option { display: flex; gap: .5rem; align-items: flex-start; margin: .25rem 0; cursor: pointer; }
        .tree-service.is-hidden, .tree-node.is-hidden { display: none; }
        .comment-cell {
            max-width: 220px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #cbd5e1;
        }
        .stats-calendar { display: flex; flex-direction: column; gap: .35rem; }
        .stats-calendar-head, .stats-calendar-row {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: .35rem;
        }
        .stats-calendar-head div {
            text-align: center;
            font-size: .8rem;
            color: var(--text-soft);
        }
        .stats-day {
            min-height: 58px;
            border: 1px solid var(--border);
            border-radius: .4rem;
            padding: .3rem .35rem;
            background: #0b1220;
        }
        .stats-day.is-out { opacity: .35; }
        .stats-day.is-today { border-color: #60a5fa; }
        .stats-day-num { font-size: .85rem; color: #e2e8f0; }
        .stats-day-count { font-size: .75rem; color: #93c5fd; margin-top: .15rem; }
        .stats-day.intensity-1 { background: rgba(37, 99, 235, 0.18); }
        .stats-day.intensity-2 { background: rgba(37, 99, 235, 0.32); }
        .stats-day.intensity-3 { background: rgba(37, 99, 235, 0.48); }
        .stats-day.intensity-4 { background: rgba(37, 99, 235, 0.68); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg border-bottom mb-4">
    <div class="container-fluid">
        <a class="navbar-brand text-light fw-bold" href="{% url 'dashboard' %}">ИТ-мастерская</a>
        {% if request.session.workshop_authenticated %}
        <div class="navbar-nav flex-row gap-2 align-items-center flex-wrap">
            <a class="btn btn-outline-light btn-sm" href="{% url 'dashboard' %}">Главная</a>
            <a class="btn btn-outline-light btn-sm" href="{% url 'orders' %}">Заказы</a>
            <a class="btn btn-outline-light btn-sm" href="{% url 'debtors' %}">Должники</a>
            <a class="btn btn-outline-light btn-sm" href="{% url 'clients' %}">Клиенты</a>
            <a class="btn btn-outline-light btn-sm" href="{% url 'services' %}">Услуги</a>
            <a class="btn btn-outline-light btn-sm" href="{% url 'acceptance_acts' %}">Акты приёма</a>
            <a class="btn btn-outline-light btn-sm" href="{% url 'statistics' %}">Статистика</a>
            <a class="btn btn-outline-light btn-sm" href="{% url 'audit_log' %}">Журнал</a>
            <a class="btn btn-success btn-sm" href="{% url 'create_order' %}">Новый заказ</a>
            <form method="post" action="{% url 'logout' %}" class="d-inline">{% csrf_token %}
                <button class="btn btn-outline-warning btn-sm" type="submit">Выйти</button>
            </form>
        </div>
        {% endif %}
    </div>
</nav>
<main class="container-fluid pb-4">
    {% if messages %}
        <div class="mb-3">
            {% for message in messages %}
                <div class="alert alert-{{ message.tags|default:'info' }} py-2 mb-2" role="alert">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}
    {% block content %}{% endblock %}
</main>
</body>
</html>
